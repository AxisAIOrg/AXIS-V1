<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-label="AXIS data engine overview">
      <defs>
        <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#fffaf0"/>
          <stop offset="0.55" stop-color="#f7efe1"/>
          <stop offset="1" stop-color="#e9d9c2"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1c140c" flood-opacity="0.14"/>
        </filter>
        <style>
          .bg{fill:url(#paper)}
          .border{fill:none;stroke:#111;stroke-width:4}
          .kicker{font:700 24px ui-monospace, SFMono-Regular, Menlo, monospace;letter-spacing:.16em;fill:#111}
          .title{font:700 62px Georgia, 'Times New Roman', serif;fill:#111}
          .subtitle{font:400 25px ui-monospace, SFMono-Regular, Menlo, monospace;fill:#4c453c}
          .flow rect,.small-card rect,.tile{fill:#fffdf7;stroke:#111;stroke-width:3;filter:url(#shadow)}
          .flow text{font:700 24px ui-monospace, SFMono-Regular, Menlo, monospace;fill:#111}
          .flow path{stroke:#111;stroke-width:4;fill:none;marker-end:url(#arrow)}
          .small-card text{font:700 20px ui-monospace, SFMono-Regular, Menlo, monospace;fill:#111}
          .tile-text{font:700 18px ui-monospace, SFMono-Regular, Menlo, monospace;fill:#4c453c;text-anchor:middle}
          .bar{fill:#111}
          .bar-val{font:700 24px ui-monospace, SFMono-Regular, Menlo, monospace;fill:#111;text-anchor:middle}
          .bar-name{font:700 20px ui-monospace, SFMono-Regular, Menlo, monospace;fill:#111;text-anchor:middle}
          .axis{stroke:#111;stroke-width:3}
        </style>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#111" />
        </marker>
      </defs>
      <rect class="bg" x="0" y="0" width="1400" height="780" rx="0"/>
      <rect class="border" x="28" y="28" width="1344" height="724" rx="38"/>
      <text class="kicker" x="70" y="100">PLACEHOLDER ASSET</text>
      <text class="title" x="70" y="178">AXIS data engine overview</text>
      <text class="subtitle" x="70" y="222">hero teaser / main system figure</text>
      
        <g class="flow">
          <rect x="105" y="215" width="230" height="145" rx="28" />
          <rect x="410" y="180" width="250" height="215" rx="28" />
          <rect x="735" y="215" width="230" height="145" rx="28" />
          <rect x="1035" y="180" width="250" height="215" rx="28" />
          <path d="M340 287 H395" />
          <path d="M665 287 H720" />
          <path d="M970 287 H1020" />
          <text x="220" y="285" text-anchor="middle">browser teleop</text>
          <text x="535" y="260" text-anchor="middle">clean + validate</text>
          <text x="535" y="312" text-anchor="middle">unified trajectories</text>
          <text x="850" y="285" text-anchor="middle">IsaacSim render</text>
          <text x="1160" y="260" text-anchor="middle">VLA training</text>
          <text x="1160" y="312" text-anchor="middle">evaluation</text>
        </g>
      
        <g class="small-card">
          <rect x="70.0" y="530.0" width="305.0" height="70" rx="18" />
          <text x="92.0" y="573.0">TaskGen</text>
        </g>
        <g class="small-card">
          <rect x="390.0" y="530.0" width="305.0" height="70" rx="18" />
          <text x="412.0" y="573.0">Web Teleoperation</text>
        </g>
        <g class="small-card">
          <rect x="710.0" y="530.0" width="305.0" height="70" rx="18" />
          <text x="732.0" y="573.0">Cleaning</text>
        </g>
        <g class="small-card">
          <rect x="1030.0" y="530.0" width="305.0" height="70" rx="18" />
          <text x="1052.0" y="573.0">Augmentation</text>
        </g>
      <text class="subtitle" x="70" y="728">Replace this SVG with your figure, video poster, or rendered pipeline asset.</text>
    </svg>